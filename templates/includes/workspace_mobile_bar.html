{% set p = request.path %}
<div class="flex h-[3.5rem] items-center justify-between border-b border-slate-200/80 bg-white/95 px-4 backdrop-blur lg:hidden">
  <a href="{{ url_for('home') }}" class="inline-flex items-center gap-2">
    <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-white p-0.5 ring-1 ring-slate-200/70">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="" class="h-6 w-auto object-contain" />
    </span>
    <span class="font-display text-sm font-bold text-slate-900">RouteWise</span>
  </a>
  <details class="relative">
    <summary class="list-none rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-[13px] font-semibold text-slate-700 shadow-sm">Menu</summary>
    <div class="absolute right-0 z-50 mt-2 w-52 overflow-hidden rounded-xl border border-slate-200/80 bg-white py-1 shadow-soft">
      <a class="block px-3 py-2 text-[13px] text-slate-700 hover:bg-slate-50" href="{{ url_for('home') }}">Home</a>
      <a class="block px-3 py-2 text-[13px] text-slate-700 hover:bg-slate-50" href="{{ url_for('planner') }}">Plan route</a>
      <a class="block px-3 py-2 text-[13px] text-slate-700 hover:bg-slate-50" href="{{ url_for('analyses') }}">Recent analyses</a>
      <a class="block px-3 py-2 text-[13px] text-slate-700 hover:bg-slate-50" href="{{ url_for('hubs') }}">Hubs</a>
      <a class="block px-3 py-2 text-[13px] text-slate-700 hover:bg-slate-50" href="{{ url_for('about') }}">About</a>
      {% if is_admin %}
        <a class="block px-3 py-2 text-[13px] font-semibold text-primary hover:bg-primary/5" href="{{ url_for('admin.dashboard') }}">Admin</a>
      {% endif %}
      <div class="my-1 h-px bg-slate-100"></div>
      <a class="block px-3 py-2 text-[13px] text-slate-700 hover:bg-slate-50" href="{{ url_for('profile') }}">Profile</a>
      <a class="block px-3 py-2 text-[13px] text-slate-600 hover:bg-slate-50" href="{{ url_for('auth.logout') }}">Log out</a>
    </div>
  </details>
</div>
