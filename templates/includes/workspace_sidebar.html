{# Left navigation for logged-in workspace #}
{% set p = request.path %}
<aside class="hidden w-[min(16.5rem,100%)] shrink-0 flex-col border-r border-slate-200/80 bg-gradient-to-b from-white via-white to-slate-50/90 lg:flex">
  <div class="flex h-[3.5rem] items-center gap-2.5 border-b border-slate-200/60 px-4">
    <a href="{{ url_for('home') }}" class="group inline-flex items-center gap-2.5">
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-white p-1 ring-1 ring-slate-200/70 shadow-sm">
        <img
          src="{{ url_for('static', filename='img/logo.png') }}"
          alt=""
          class="h-7 w-auto object-contain"
          loading="eager"
        />
      </span>
      <span class="font-display text-[15px] font-bold tracking-tight text-slate-900">RouteWise</span>
    </a>
  </div>

  <p class="px-4 pt-5 pb-2 text-[10px] font-semibold uppercase tracking-[0.16em] text-slate-400">Workspace</p>
  <nav class="flex flex-1 flex-col gap-0.5 px-2 pb-4" aria-label="Primary">
    <a href="{{ url_for('home') }}" class="rw-side-nav {% if p == '/home' %}rw-side-nav--active{% endif %}" {% if p == '/home' %}aria-current="page"{% endif %}>Home</a>
    <a
      href="{{ url_for('planner') }}"
      class="rw-side-nav {% if p == '/planner' or p == '/results' %}rw-side-nav--active{% endif %}"
      {% if p == '/planner' or p == '/results' %}aria-current="page"{% endif %}
    >Plan route</a>
    <a href="{{ url_for('analyses') }}" class="rw-side-nav {% if p == '/analyses' %}rw-side-nav--active{% endif %}" {% if p == '/analyses' %}aria-current="page"{% endif %}>Recent analyses</a>
    <a href="{{ url_for('hubs') }}" class="rw-side-nav {% if p == '/hubs' %}rw-side-nav--active{% endif %}" {% if p == '/hubs' %}aria-current="page"{% endif %}>Hubs</a>
    <a href="{{ url_for('about') }}" class="rw-side-nav {% if p == '/about' %}rw-side-nav--active{% endif %}" {% if p == '/about' %}aria-current="page"{% endif %}>About</a>
    {% if is_admin %}
      <p class="px-3 pt-5 pb-2 text-[10px] font-semibold uppercase tracking-[0.16em] text-slate-400">Operations</p>
      <a
        href="{{ url_for('admin.dashboard') }}"
        class="rw-side-nav {% if p.startswith('/admin') %}rw-side-nav--active{% endif %}"
        {% if p.startswith('/admin') %}aria-current="page"{% endif %}
      >Admin</a>
    {% endif %}
  </nav>

  <div class="mt-auto border-t border-slate-200/70 px-2 py-4">
    <a href="{{ url_for('profile') }}" class="rw-side-nav {% if p == '/profile' %}rw-side-nav--active{% endif %} mb-0.5" {% if p == '/profile' %}aria-current="page"{% endif %}>Profile</a>
    <a href="{{ url_for('auth.logout') }}" class="rw-side-nav rw-side-nav--muted">Log out</a>
    <p class="mt-3 truncate px-3 text-[11px] leading-snug text-slate-400" title="{{ current_user.email }}">{{ current_user.username }}</p>
  </div>
</aside>
