{% extends "base.html" %}

{% block content %}
  <div class="flex items-end justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold tracking-tight text-slate-900 font-display">Inspect nodes</h1>
      <p class="mt-1 text-sm text-slate-600">Read-only network directory for operational review.</p>
    </div>
    <a href="{{ url_for('admin.dashboard') }}" class="rounded-xl bg-slate-50 px-4 py-2 text-sm font-semibold text-slate-800 ring-1 ring-slate-200/60 hover:bg-white">
      Back to dashboard
    </a>
  </div>

  <div class="mt-6 grid gap-4 md:grid-cols-2 lg:grid-cols-3">
    {% for n in nodes %}
      <div class="rounded-2xl border border-slate-200/70 bg-white p-5 shadow-card">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm font-bold text-slate-900">{{ n.name }}</p>
            <p class="mt-1 text-sm text-slate-600">{{ n.city }}, {{ n.country }}</p>
          </div>
          <span class="rounded-xl bg-slate-50 px-3 py-1 text-xs font-semibold text-slate-700 ring-1 ring-slate-200/60">
            {{ n.type | format_node_type }}
          </span>
        </div>
        <p class="mt-4 text-xs text-slate-600">{{ n.description }}</p>
        <p class="mt-3 text-xs text-slate-500"><span class="font-semibold text-slate-700">ID:</span> {{ n.id }}</p>
      </div>
    {% endfor %}
  </div>
{% endblock %}
