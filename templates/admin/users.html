{% extends "base.html" %}

{% block content %}
  <div class="flex items-end justify-between gap-4">
    <div>
      <h1 class="text-3xl font-bold tracking-tight text-slate-900 font-display">Manage users</h1>
      <p class="mt-1 text-sm text-slate-600">Read-only account list for operational oversight.</p>
    </div>
    <a href="{{ url_for('admin.dashboard') }}" class="rounded-xl bg-slate-50 px-4 py-2 text-sm font-semibold text-slate-800 ring-1 ring-slate-200/60 hover:bg-white">
      Back to dashboard
    </a>
  </div>

  <div class="mt-6 overflow-hidden rounded-2xl border border-slate-200/70 bg-white shadow-card">
    <table class="w-full text-left text-sm">
      <thead class="bg-slate-50 text-xs font-semibold uppercase tracking-wide text-slate-600">
        <tr>
          <th class="px-4 py-3">Username</th>
          <th class="px-4 py-3">Email</th>
          <th class="px-4 py-3">Role</th>
          <th class="px-4 py-3">Joined</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-200/70">
        {% for u in users %}
          <tr>
            <td class="px-4 py-3 font-semibold text-slate-900">{{ u.username }}</td>
            <td class="px-4 py-3 text-slate-700">{{ u.email }}</td>
            <td class="px-4 py-3 text-slate-700">{{ u.role }}</td>
            <td class="px-4 py-3 text-slate-700">{{ u.created_at.strftime("%Y-%m-%d") }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
