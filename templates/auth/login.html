{% extends "base.html" %}

{% block content %}
  <div class="h-[calc(100vh-3.5rem)] overflow-hidden grid lg:grid-cols-[55%_45%]">
    <section class="h-full flex items-center justify-center px-6 sm:px-10">
      <div class="w-full max-w-[420px]">
        <div class="flex items-center gap-3">
          <span class="inline-flex items-center justify-center rounded-2xl bg-white p-1 ring-1 ring-slate-200/70 shadow-sm overflow-hidden">
            <img
              src="{{ url_for('static', filename='img/logo.png') }}"
              alt="RouteWise"
              class="h-12 w-auto object-contain"
              loading="eager"
            />
          </span>
          <span class="text-sm font-semibold text-slate-900 font-display">RouteWise</span>
        </div>

        <h1 class="mt-5 text-3xl font-bold tracking-tight text-slate-900 font-display">Welcome back</h1>
        <p class="mt-1 text-sm text-slate-600">Sign in to continue to RouteWise.</p>

        <form method="POST" class="mt-5 space-y-4">
          <div>
            <label class="text-sm font-semibold text-slate-800" for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              value="{{ (form.email if form else '') }}"
              class="mt-2 w-full rounded-xl border-slate-200 bg-white px-3 py-2.5 text-sm shadow-sm focus:border-primary/40 focus:outline-none focus:ring-2 focus:ring-primary/20 transition"
              required
            />
          </div>

          <div>
            <label class="text-sm font-semibold text-slate-800" for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              class="mt-2 w-full rounded-xl border-slate-200 bg-white px-3 py-2.5 text-sm shadow-sm focus:border-primary/40 focus:outline-none focus:ring-2 focus:ring-primary/20 transition"
              required
            />
          </div>

          <button
            type="submit"
            class="inline-flex w-full items-center justify-center rounded-xl bg-primary px-5 py-3 text-sm font-semibold text-white shadow-soft transition hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/25"
          >
            Log in
          </button>

          <p class="text-sm text-slate-600">
            New to RouteWise?
            <a class="font-semibold text-primary hover:underline" href="{{ url_for('auth.register') }}">Create an account</a>
          </p>
        </form>
      </div>
    </section>

    <aside class="hidden lg:flex h-full p-6">
      <div class="h-full w-full overflow-hidden rounded-3xl ring-1 ring-slate-200/60 bg-white">
        <img
          src="{{ url_for('static', filename='images/auth-side.png') }}"
          alt=""
          class="h-full w-full object-cover"
        />
      </div>
    </aside>
  </div>
{% endblock %}
